<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#F8FAFC"/>
  
  <!-- Layer Labels -->
  <text x="50" y="80" font-family="Arial" font-size="18" font-weight="bold" fill="#64748B">FRONTEND (React &amp; TS)</text>
  <text x="50" y="280" font-family="Arial" font-size="18" font-weight="bold" fill="#64748B">BACKEND (FastAPI)</text>
  <text x="50" y="480" font-family="Arial" font-size="18" font-weight="bold" fill="#64748B">DATABASE (PostgreSQL)</text>

  <!-- Frontend Layer -->
  <rect x="100" y="100" width="180" height="80" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"/>
  <text x="190" y="145" font-family="Arial" font-size="14" text-anchor="middle" fill="#1E293B">Public Calendar UI</text>
  
  <rect x="310" y="100" width="180" height="80" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"/>
  <text x="400" y="145" font-family="Arial" font-size="14" text-anchor="middle" fill="#1E293B">Check-out / Photo</text>
  
  <rect x="520" y="100" width="180" height="80" rx="8" fill="#FFFFFF" stroke="#EF4444" stroke-width="2"/>
  <text x="610" y="145" font-family="Arial" font-size="14" text-anchor="middle" fill="#1E293B">Admin Dash (Override)</text>

  <!-- Backend Layer -->
  <rect x="100" y="300" width="180" height="100" rx="8" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
  <text x="190" y="350" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="#0369A1">Booking Engine</text>
  <text x="190" y="370" font-family="Arial" font-size="12" text-anchor="middle" fill="#0369A1">(Race Condition Logic)</text>
  
  <rect x="310" y="300" width="180" height="100" rx="8" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
  <text x="400" y="350" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="#0369A1">Fair-Play Engine</text>
  <text x="400" y="370" font-family="Arial" font-size="12" text-anchor="middle" fill="#0369A1">(Quota &amp; Strikes)</text>
  
  <rect x="520" y="300" width="180" height="100" rx="8" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
  <text x="610" y="350" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="#0369A1">Override Service</text>
  <text x="610" y="370" font-family="Arial" font-size="12" text-anchor="middle" fill="#0369A1">(Refunds &amp; Logs)</text>

  <!-- Database Layer -->
  <path d="M350 500 C 350 480, 450 480, 450 500 L 450 560 C 450 580, 350 580, 350 560 Z" fill="#F1F5F9" stroke="#475569" stroke-width="2"/>
  <ellipse cx="400" cy="500" rx="50" ry="15" fill="#F1F5F9" stroke="#475569" stroke-width="2"/>
  <text x="400" y="540" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="#334155">PostgreSQL</text>
  <text x="400" y="555" font-family="Arial" font-size="10" text-anchor="middle" fill="#334155">(Row-Level Locking)</text>

  <!-- Arrows / Flows -->
  <!-- Booking Flow -->
  <path d="M190 180 L 190 300" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Photo/Maintenance Flow -->
  <path d="M400 180 L 400 300" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Override Flow -->
  <path d="M610 180 L 610 300" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Database Connection -->
  <path d="M190 400 L 350 510" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4"/>
  <path d="M400 400 L 400 485" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4"/>
  <path d="M610 400 L 450 510" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Definitions for arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8" />
    </marker>
  </defs>
</svg>